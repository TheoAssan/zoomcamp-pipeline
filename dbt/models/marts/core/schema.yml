version: 2

models:
  - name: dim_athletes
    description: "Athlete dimension — unique athletes enriched with country name from IOC lookup"
    columns:
      - name: athlete_code
        description: "Unique numeric athlete identifier"
        tests:
          - not_null
          - unique
      - name: athlete_name
        description: "Full name of the athlete"
        tests:
          - not_null
      - name: gender
        description: "Gender (M or F)"
        tests:
          - not_null
      - name: country_code
        description: "IOC country code"
        tests:
          - not_null
      - name: country_name
        description: "Full country name from IOC codes lookup"

  - name: dim_countries
    description: "Country dimension — distinct participating countries with full names from IOC lookup"
    columns:
      - name: country_code
        description: "IOC country code"
        tests:
          - not_null
          - unique
      - name: country_name
        description: "Full country name"

  - name: dim_discipline
    description: "Discipline dimension — distinct sport disciplines with standardized names"
    columns:
      - name: discipline_code
        description: "Short code identifying the discipline"
        tests:
          - not_null
          - unique
      - name: discipline
        description: "Full discipline name (Snowboard normalized to Snowboarding)"
        tests:
          - not_null

  - name: dim_events
    description: "Event dimension — distinct events with surrogate key, expanded by gender for mixed/group events"
    columns:
      - name: event_id
        description: "Surrogate key generated from discipline_code + event_name"
        tests:
          - not_null
      - name: event_name
        description: "Name of the event"
        tests:
          - not_null
      - name: gender
        description: "Gender category for the event (M or F)"
        tests:
          - not_null
      - name: discipline_code
        description: "Code identifying the sport discipline"
        tests:
          - not_null
      - name: event_type
        description: "Type classification of the event"

  - name: fact_athlete_perf
    description: "Athlete performance fact — one row per medal won, enriched with athlete, event, and discipline dimensions. Includes total medal count and multi-medallist flag."
    columns:
      - name: medal
        description: "Medal type (GOLD, SILVER, BRONZE)"
        tests:
          - not_null
      - name: athlete_code
        description: "References dim_athletes"
        tests:
          - not_null
      - name: athlete_total_medals
        description: "Window count of total medals for this athlete"
        tests:
          - not_null
      - name: is_multi_medallist
        description: "True if the athlete won more than one medal"
        tests:
          - not_null

  - name: fact_country_perf
    description: "Country performance fact — medal counts, athlete counts, and conversion rate per country. Includes AIN (Individual Neutral Athletes) medal aggregation."
    columns:
      - name: country_code
        description: "IOC country code (references dim_countries)"
        tests:
          - not_null
          - unique
      - name: total_medals
        description: "Total medals won by this country"
        tests:
          - not_null
      - name: total_athletes
        description: "Number of athletes representing this country"
        tests:
          - not_null
      - name: won_medal
        description: "Boolean flag — true if the country won at least one medal"
        tests:
          - not_null
      - name: conversion_rate
        description: "Percentage of athletes who won medals (total_medals / total_athletes * 100)"

  - name: fact_discipline
    description: "Discipline-level medal aggregation — medal counts by country, discipline, and medal type"
    columns:
      - name: country_code
        description: "IOC country code"
        tests:
          - not_null
      - name: discipline_code
        description: "Sport discipline code"
        tests:
          - not_null
      - name: medal
        description: "Medal type (GOLD, SILVER, BRONZE)"
        tests:
          - not_null
      - name: medal_count
        description: "Number of distinct events won for this medal type"
        tests:
          - not_null
