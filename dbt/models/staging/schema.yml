version: 2

models:
  - name: stg_Milano_26__athletes_winter26
    description: "Staged athlete data with standardized types and uppercase country/gender codes"
    columns:
      - name: athlete_code
        description: "Unique numeric identifier for each athlete"
        tests:
          - not_null
          - unique
      - name: athlete_name
        description: "Full name of the athlete"
        tests:
          - not_null
      - name: gender
        description: "Gender code (M or F)"
        tests:
          - not_null
          - accepted_values:
              values: ['M', 'F']
      - name: country_code
        description: "IOC country code (e.g., USA, GBR, FRA)"
        tests:
          - not_null

  - name: stg_Milano_26__medallists_winter26
    description: "Staged individual medallist records with standardized types"
    columns:
      - name: medal_code
        description: "Numeric medal code (1=Gold, 2=Silver, 3=Bronze)"
        tests:
          - not_null
      - name: medal
        description: "Medal type name"
        tests:
          - not_null
          - accepted_values:
              values: ['GOLD', 'SILVER', 'BRONZE']
              quote: true
      - name: athlete_code
        description: "References the athlete who won the medal"
        tests:
          - not_null
      - name: country_code
        description: "IOC country code of the medallist"
        tests:
          - not_null
      - name: discipline_code
        description: "Code identifying the sport discipline"
        tests:
          - not_null
      - name: event_name
        description: "Name of the event in which the medal was won"
        tests:
          - not_null

  - name: stg_Milano_26__medals_winter26
    description: "Staged country-level medal tally with gold, silver, bronze counts"
    columns:
      - name: country_code
        description: "IOC country code"
        tests:
          - not_null
          - unique
      - name: gold
        description: "Number of gold medals"
        tests:
          - not_null
      - name: silver
        description: "Number of silver medals"
        tests:
          - not_null
      - name: bronze
        description: "Number of bronze medals"
        tests:
          - not_null
      - name: total
        description: "Total medal count"
        tests:
          - not_null

  - name: stg_Milano_26__schedules_winter26
    description: "Staged event schedule data with timestamps and venue details"
    columns:
      - name: event_start
        description: "Scheduled start timestamp of the event"
        tests:
          - not_null
      - name: event_name
        description: "Name of the scheduled event"
        tests:
          - not_null
      - name: discipline_code
        description: "Code identifying the sport discipline"
        tests:
          - not_null
      - name: venue
        description: "Name of the venue hosting the event"
      - name: id
        description: "Unique schedule entry identifier"
        tests:
          - not_null
          - unique
